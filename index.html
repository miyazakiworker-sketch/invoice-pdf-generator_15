<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>だるい見積書・請求書一瞬PDFジェネレーター</title>
  <style>
    /* --- ココアさんの基本デザインシステム --- */
    :root {
      --bg-color: #f4f7f6;
      --panel-bg: #ffffff;
      --text-color: #333333;
      --accent-color: #0076df;
      --border-color: #cccccc;
      --x-color: #1da1f2;
    }

    body {
      font-family: "Helvetica Neue", Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 950px;
      margin: 0 auto;
    }

    h1, .subtitle {
      text-align: center;
      margin: 0 0 5px 0;
    }

    h1 {
      color: var(--accent-color);
      font-size: 24px;
    }

    .subtitle {
      font-size: 14px;
      color: #666;
      margin-bottom: 25px;
    }

    /* 操作パネル */
    .control-panel {
      background: var(--panel-bg);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 30px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }

    .panel-title {
      font-size: 16px;
      font-weight: bold;
      margin: 0 0 15px 0;
      border-bottom: 2px solid var(--accent-color);
      padding-bottom: 5px;
    }

    .form-row {
      display: flex;
      gap: 15px;
      margin-bottom: 15px;
    }

    .form-row > div {
      flex: 1;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 5px;
    }

    input, textarea, select {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      box-sizing: border-box;
      font-size: 14px;
    }

    .toggle-container {
      display: flex;
      gap: 10px;
    }

    .btn-toggle {
      flex: 1;
      padding: 10px;
      font-size: 13px;
      font-weight: bold;
      border: 1px solid var(--border-color);
      background: #f9f9f9;
      border-radius: 4px;
      cursor: pointer;
    }

    .btn-toggle.active {
      background-color: var(--accent-color);
      color: white;
      border-color: var(--accent-color);
    }

    .btn-container {
      display: flex;
      gap: 15px;
      margin-top: 20px;
    }

    .btn {
      flex: 1;
      padding: 12px;
      font-size: 15px;
      font-weight: bold;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      text-align: center;
    }

    .btn-pdf { background-color: #2ed573; color: white; }
    .btn-x { background-color: var(--x-color); color: white; text-decoration: none; }
    .btn-clear { background-color: #e0e0e0; color: #333; }
    
    .x-follow-badge {
      display: inline-block;
      background-color: #1da1f2 !important;
      color: white !important;
      text-decoration: none !important;
      font-weight: bold;
      font-size: 13px;
      padding: 10px 24px;
      border-radius: 20px;
      margin: 20px 0;
    }

    .disclaimer {
      margin-top: 30px;
      padding: 15px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 11px;
      color: #666;
    }
    
    /* 📋 印刷時（PDF保存時）のA4レイアウト専用設定 */
    .invoice-page { font-size: 14px; color: #000; background: #fff; }
    .invoice-title { font-size: 28px; font-weight: bold; letter-spacing: 4px; text-align: center; margin-bottom: 30px; border-bottom: 3px double #000; padding-bottom: 5px; }
    .invoice-header { display: flex; justify-content: space-between; margin-bottom: 30px; }
    .client-side { width: 50%; }
    .client-name { font-size: 18px; font-weight: bold; border-bottom: 1px solid #000; padding-bottom: 5px; }
    .provider-side { width: 45%; text-align: right; }
    .provider-name { font-size: 16px; font-weight: bold; }
    .total-block { background: #f2f2f2; border-top: 2px solid #000; border-bottom: 2px solid #000; padding: 10px 15px; font-size: 20px; font-weight: bold; display: flex; justify-content: space-between; margin-bottom: 30px; }
    .item-table { width: 100%; border-collapse: collapse; margin-bottom: 30px; }
    .item-table th { background: #f2f2f2; border-top: 1px solid #000; border-bottom: 1px solid #000; padding: 8px; font-size: 13px; }
    .item-table td { border-bottom: 1px solid #e0e0e0; padding: 10px 8px; }
    .text-center { text-align: center; }
    .text-right { text-align: right; }
    .invoice-footer-details { display: flex; gap: 20px; margin-top: 40px; }
    .bottom-box { flex: 1; border: 1px solid #ccc; padding: 12px; border-radius: 4px; background: #fafafa; font-size: 12px; }
    .bottom-box-title { font-weight: bold; margin-bottom: 5px; border-bottom: 1px solid #ccc; padding-bottom: 3px; }
    .bottom-box p { margin: 4px 0; white-space: pre-wrap; }
    
    /* 印刷時の表示切り替え制御 */
    @media print {
            .ad-container { display: none !important; }
      body { background: none; padding: 0; }
      .control-panel, h1, .subtitle, .disclaimer, .no-print, .x-follow-badge { display: none !important; }
      #runtime-invoice-wrapper { display: block !important; }
    }
        /* --- 過去作準拠：将来使う広告枠のデザイン --- */
    .ad-container {
      margin-top: 30px;
      text-align: center;
    }

    .ad-label {
      font-size: 10px;
      color: #999999;
      letter-spacing: 1px;
      margin-bottom: 5px;
    }

    .ad-box {
      background: #ffffff;
      border: 2px dashed var(--border-color); /* 過去作通りの点線枠 */
      border-radius: 6px;
      padding: 20px;
      color: #777777;
      font-size: 13px;
      font-weight: bold;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
    }

  </style>
</head>
<body>

<div class="container">
  <h1>だるい見積書・請求書一瞬PDFジェネレーター</h1>
  <div class="subtitle">一度入力すればLocalStorageが一生記憶。次回から3秒でマナー100点満点のPDFが出力可能。</div>

  <!-- 操作パネル -->
  <div class="control-panel">
    <div class="panel-title">⚙️ 書類設定（入力するとリアルタイム反映）</div>
    <div class="form-row">
      <div><label>書類種別</label><select id="input-doc-type"><option value="請求書">請求書</option><option value="見積書">見積書</option></select></div>
      <div><label>書類番号 (任意)</label><input type="text" id="input-doc-id" placeholder="例：IV-20260001"></div>
    </div>
    <div class="form-row">
      <div><label>発行日</label><input type="date" id="input-issue-date"></div>
      <div><label>お支払期限 / 有効期限</label><input type="date" id="input-due-date"></div>
    </div>
    <div class="form-row">
      <div style="flex: 2;"><label>取引先名 (宛名)</label><input type="text" id="input-client" placeholder="株式会社〇〇 御中"></div>
      <div><label>件名</label><input type="text" id="input-subject" placeholder="例：Webサイト制作御請求"></div>
    </div>
    <div class="form-row">
      <div style="flex: 2;"><label>品名 / 案件名</label><input type="text" id="input-item-name" placeholder="例：システム開発案件 コーディング費"></div>
      <div><label>単価 (税抜・円)</label><input type="number" id="input-item-price" placeholder="300000"></div>
    </div>
    <div class="form-row">
      <div><label>インボイス制度</label><div class="toggle-container"><button type="button" id="btn-invoice-on" class="btn-toggle active">対応する</button><button type="button" id="btn-invoice-off" class="btn-toggle">非対応</button></div></div>
      <div><label>源泉徴収税の自動差引</label><div class="toggle-container"><button type="button" id="btn-gensen-on" class="btn-toggle">引く</button><button type="button" id="btn-gensen-off" class="btn-toggle active">引かない</button></div></div>
    </div>
    <div class="panel-title" style="margin-top: 25px;">👤 あなたの情報（自動記憶されます）</div>
    <div class="form-row">
      <div><label>屋号 / 氏名</label><input type="text" id="save-my-name" placeholder="ココアアプリ開発工房"></div>
      <div><label>インボイス登録番号</label><input type="text" id="save-my-invoice-id" placeholder="T1234567890123"></div>
    </div>
    <div class="form-group" style="margin-bottom: 15px;"><label>住所・連絡先</label><textarea id="save-my-address" rows="2" placeholder="〒000-0000..."></textarea></div>
    <div class="form-group" style="margin-bottom: 15px;"><label>お振込先口座情報</label><textarea id="save-my-bank" rows="2" placeholder="〇〇銀行..."></textarea></div>
    <div class="form-group"><label>備考欄</label><textarea id="input-notes" rows="2"></textarea></div>
    <div class="btn-container">
      <button class="btn btn-clear" id="clear-storage-btn">記憶クリア</button>
      <button class="btn btn-x" id="copy-x-btn">進捗をXで報告 📋</button>
      <button class="btn btn-pdf" id="pdf-output-btn">✨ 1タップでPDF出力</button>
    </div>
  </div>

  <div style="text-align: center;" class="no-print"><a href="https://x.com/cocoa_next7" target="_blank" class="x-follow-badge">🐦 開発者ココアのXをフォローする</a></div>
    <!-- 広告表示エリア（過去作と同様のサイズで配置） -->
  <div class="ad-container no-print">
    <div class="ad-label">SPONSORED</div>
    <div class="ad-box">
      <p>【ここに将来の広告や自作アプリのバナーを表示】</p>
      <!-- 実装例：<a href="URL"><img src="banner.png" alt="広告"></a> -->
    </div>
  </div>

  <div class="disclaimer"><strong>【免責事項】</strong><br>本ツールはブラウザのLocalStorage機能を使用し端末内のみに情報を保存します。生成書類の正確性やトラブルについて開発者は一切の責任を負いません。</div>
</div>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    const docTypeInput = document.getElementById("input-doc-type"), docIdInput = document.getElementById("input-doc-id"), issueDateInput = document.getElementById("input-issue-date"), dueDateInput = document.getElementById("input-due-date"), clientInput = document.getElementById("input-client"), subjectInput = document.getElementById("input-subject"), itemNameInput = document.getElementById("input-item-name"), itemPriceInput = document.getElementById("input-item-price"), notesInput = document.getElementById("input-notes"), myNameInput = document.getElementById("save-my-name"), myInvoiceIdInput = document.getElementById("save-my-invoice-id"), myAddressInput = document.getElementById("save-my-address"), myBankInput = document.getElementById("save-my-bank"), btnInvoiceOn = document.getElementById("btn-invoice-on"), btnInvoiceOff = document.getElementById("btn-invoice-off"), btnGensenOn = document.getElementById("btn-gensen-on"), btnGensenOff = document.getElementById("btn-gensen-off"), clearStorageBtn = document.getElementById("clear-storage-btn"), copyXBtn = document.getElementById("copy-x-btn"), pdfOutputBtn = document.getElementById("pdf-output-btn");
    let isInvoiceMode = true, isGensenMode = false, shareText = "";
    const today = new Date(); issueDateInput.value = today.toISOString().substr(0, 10);
    const nextMonthEnd = new Date(today.getFullYear(), today.getMonth() + 2, 0); dueDateInput.value = nextMonthEnd.toISOString().substr(0, 10);
    notesInput.value = "※振込手数料は貴社にてご負担願います。";
    const loadFields = ["name", "invoice_id", "address", "bank", "invoice_mode", "gensen_mode"];
    const savedData = {}; loadFields.forEach(f => { savedData[f] = localStorage.getItem("cocoa-invoice-" + f); });
    if (savedData.name) myNameInput.value = savedData.name;
    if (savedData.invoice_id) myInvoiceIdInput.value = savedData.invoice_id;
    if (savedData.address) myAddressInput.value = savedData.address;
    if (savedData.bank) myBankInput.value = savedData.bank;
    if (savedData.invoice_mode === "false") { isInvoiceMode = false; btnInvoiceOn.classList.remove("active"); btnInvoiceOff.classList.add("active"); }
    if (savedData.gensen_mode === "true") { isGensenMode = true; btnGensenOn.classList.add("active"); btnGensenOff.classList.remove("active"); }
    
    btnInvoiceOn.addEventListener("click", () => { isInvoiceMode = true; btnInvoiceOn.classList.add("active"); btnInvoiceOff.classList.remove("active"); updateDataOnly(); });
    btnInvoiceOff.addEventListener("click", () => { isInvoiceMode = false; btnInvoiceOff.classList.add("active"); btnInvoiceOn.classList.remove("active"); updateDataOnly(); });
    btnGensenOn.addEventListener("click", () => { isGensenMode = true; btnGensenOn.classList.add("active"); btnGensenOff.classList.remove("active"); updateDataOnly(); });
    btnGensenOff.addEventListener("click", () => { isGensenMode = false; btnGensenOff.classList.add("active"); btnGensenOn.classList.remove("active"); updateDataOnly(); });

    function updateDataOnly() {
      const docType = docTypeInput ? (docTypeInput.value || '請求書') : '請求書', subject = subjectInput ? (subjectInput.value || '〇〇に関する御請求') : '〇〇に関する御請求', itemPrice = itemPriceInput ? (parseFloat(itemPriceInput.value) || 0) : 0;
      let subtotal = itemPrice, tax = isInvoiceMode ? Math.floor(subtotal * 0.10) : 0, gensen = isGensenMode ? Math.floor(subtotal * 0.1021) : 0, grandTotal = subtotal + tax - gensen;
      if (myNameInput) localStorage.setItem("cocoa-invoice-name", myNameInput.value);
      if (myInvoiceIdInput) localStorage.setItem("cocoa-invoice-invoice_id", myInvoiceIdInput.value);
      if (myAddressInput) localStorage.setItem("cocoa-invoice-address", myAddressInput.value);
      if (myBankInput) localStorage.setItem("cocoa-invoice-bank", myBankInput.value);
      localStorage.setItem("cocoa-invoice-invoice_mode", isInvoiceMode);
      localStorage.setItem("cocoa-invoice-gensen_mode", isGensenMode);
      shareText = `【${docType}一瞬ジェネレーターで書類を作成しました！】\n件名: ${subject}\n総額: ￥${grandTotal.toLocaleString()}-\nLocalStorage記憶機能で、次回から3秒でマナー100点満点のPDF出力が可能🔥\nアプデ後もURLは一生同じ！`;
    }
    const allInputs = [docTypeInput, docIdInput, issueDateInput, dueDateInput, clientInput, subjectInput, itemNameInput, itemPriceInput, notesInput, myNameInput, myInvoiceIdInput, myAddressInput, myBankInput];
    allInputs.forEach(inp => { if (inp) inp.addEventListener("input", updateDataOnly); });

    if (pdfOutputBtn) {
      pdfOutputBtn.addEventListener("click", () => {
        const docType = docTypeInput ? (docTypeInput.value || '請求書') : '請求書', docId = docIdInput ? (docIdInput.value || '---') : '---', client = clientInput ? (clientInput.value || '株式会社〇〇 御中') : '株式会社〇〇 御中', subject = subjectInput ? (subjectInput.value || '〇〇に関する御請求') : '〇〇に関する御請求', itemName = itemNameInput ? (itemNameInput.value || '（未入力の品名）') : '（未入力の品名）', itemPrice = itemPriceInput ? (parseFloat(itemPriceInput.value) || 0) : 0;
        const myName = myNameInput ? (myNameInput.value || '（あなたの屋号・氏名）') : '（あなたの屋号・氏名）', myInvoiceId = myInvoiceIdInput ? (myInvoiceIdInput.value || '未登録') : '未登録', myAddress = myAddressInput ? (myAddressInput.value || '（あなたの住所・連絡先）') : '（あなたの住所・連絡先）', myBank = myBankInput ? (myBankInput.value || '（振込先口座情報）') : '（振込先口座情報）', notes = notesInput ? (notesInput.value || '') : '';
        let subtotal = itemPrice, tax = isInvoiceMode ? Math.floor(subtotal * 0.10) : 0, gensen = isGensenMode ? Math.floor(subtotal * 0.1021) : 0, grandTotal = subtotal + tax - gensen;
        const formatDate = (dateStr) => { if(!dateStr) return '---'; const d = new Date(dateStr); return `${d.getFullYear()}年${String(d.getMonth()+1).padStart(2,'0')}月${String(d.getDate()).padStart(2,'0')}日`; };
        const oldWrapper = document.getElementById('runtime-invoice-wrapper'); if (oldWrapper) oldWrapper.remove();
        const wrapper = document.createElement('div'); wrapper.id = 'runtime-invoice-wrapper'; wrapper.style.display = 'none';
        wrapper.innerHTML = `<div class="invoice-page"><div class="invoice-title">${docType.split('').join(' ')}</div><div class="invoice-header"><div class="client-side"><div class="client-name">${client}</div><div style="margin-top:15px;">件名：${subject}</div></div><div class="provider-side"><div style="margin-bottom:10px;"><div>日付：${formatDate(issueDateInput.value)}</div><div>番号：${docId}</div></div><div class="provider-name">${myName}</div><div style="white-space:pre-wrap;font-size:12px;color:#333;">${myAddress}</div><div style="font-size:11px;margin-top:5px;">${isInvoiceMode ? '登録番号: ' + myInvoiceId : ''}</div></div></div><div class="total-block"><span>ご${docType}金額：</span><span>￥${grandTotal.toLocaleString()}- (${isInvoiceMode ? '税込' : '非課税'})</span></div><table class="item-table"><thead><tr><th style="width:55%;">品名 / 項目</th><th style="width:15%;">数量</th><th style="width:30%;" class="text-right">金額(税込)</th></tr></thead><tbody><tr><td>${itemName}</td><td class="text-center">1</td><td class="text-right">￥${subtotal.toLocaleString()}</td></tr><tr><td colspan="2" class="text-right" style="font-size:12px;color:#555;">小計 (税抜)</td><td class="text-right">￥${subtotal.toLocaleString()}</td></tr>${isInvoiceMode ? `<tr><td colspan="2" class="text-right" style="font-size:12px;color:#555;">消費税額 (10%)</td><td class="text-right">￥${tax.toLocaleString()}</td></tr>` : ''}${isGensenMode ? `<tr><td colspan="2" class="text-right" style="font-size:12px;color:#d32f2f;">源泉徴収税額 (10.21%)</td><td class="text-right" style="color:#d32f2f;">-￥${gensen.toLocaleString()}</td></tr>` : ''}</tbody></table><div class="invoice-footer-details"><div class="bottom-box"><div class="bottom-box-title">🏦 お振込み先</div><p style="white-space:pre-wrap;">${myBank}</p></div><div class="bottom-box"><div class="bottom-box-title">📝 備考 / お支払期限</div><div><strong>期限:</strong> ${formatDate(dueDateInput.value)}</div><p style="margin-top:8px;white-space:pre-wrap;">${notes}</p></div></div></div>`;
        document.body.appendChild(wrapper); window.print();
      });
    }

    if (clearStorageBtn) {
      clearStorageBtn.addEventListener("click", () => {
        if(confirm('記憶を完全に削除しますか？')) {
          localStorage.clear(); if (myNameInput) myNameInput.value = ''; if (myInvoiceIdInput) myInvoiceIdInput.value = ''; if (myAddressInput) myAddressInput.value = ''; if (myBankInput) myBankInput.value = ''; isInvoiceMode = true; isGensenMode = false; if (btnInvoiceOn) btnInvoiceOn.classList.add("active"); if (btnInvoiceOff) btnInvoiceOff.classList.remove("active"); if (btnGensenOn) btnGensenOn.classList.remove("active"); if (btnGensenOff) btnGensenOff.classList.add("active"); updateDataOnly();
        }
      });
    }
        // 💡 X報告ボタンの修正（コピー後に自動でXへジャンプ）
    if (copyXBtn) {
      copyXBtn.addEventListener("click", () => {
        if (!shareText) return;
        navigator.clipboard.writeText(shareText).then(() => {
          copyXBtn.textContent = "進捗コピー完了！Xへ移動します...💨";
          copyXBtn.style.backgroundColor = "#2ed573";
          setTimeout(() => {
            window.open(`https://twitter.com{encodeURIComponent(shareText)}`, "_blank");
            copyXBtn.textContent = "進捗をXで報告 📋";
            copyXBtn.style.backgroundColor = "#1da1f2";
          }, 1500);
        }).catch(() => console.log("コピーエラー"));
      });
    }

    // 初回起動
    updateDataOnly();
  });
</script>
</body>
</html>
