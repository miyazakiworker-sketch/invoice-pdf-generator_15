<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>だるい見積書・請求書一瞬PDFジェネレーター</title>
  <style>
    /* --- ココアさんの基本デザインシステム --- */
    :root {
      --bg-color: #f4f7f6;
      --panel-bg: #ffffff;
      --text-color: #333333;
      --accent-color: #0076df;
      --border-color: #cccccc;
      --x-color: #1da1f2;
    }

    <body>

<div class="container">
  <h1>だるい見積書・請求書一瞬PDFジェネレーター</h1>
  <div class="subtitle">一度入力すればLocalStorageが一生記憶。次回から3秒でマナー100点満点のPDFが出力可能。</div>

  <!-- 操作パネル -->
  <div class="control-panel">
    <div class="panel-title">⚙️ 書類設定（入力するとリアルタイム反映）</div>
    
    <div class="form-row">
      <div>
        <label for="input-doc-type">書類種別</label>
        <select id="input-doc-type">
          <option value="請求書">請求書</option>
          <option value="見積書">見積書</option>
        </select>
      </div>
      <div>
        <label for="input-doc-id">書類番号 (任意)</label>
        <input type="text" id="input-doc-id" placeholder="例：IV-20260001">
      </div>
    </div>

    <div class="form-row">
      <div>
        <label for="input-issue-date">発行日</label>
        <input type="date" id="input-issue-date">
      </div>
      <div>
        <label for="input-due-date">お支払期限 / 有効期限</label>
        <input type="date" id="input-due-date">
      </div>
    </div>

    <div class="form-row">
      <div style="flex: 2;">
        <label for="input-client">取引先名 (宛名)</label>
        <input type="text" id="input-client" placeholder="株式会社〇〇 御中">
      </div>
      <div>
        <label for="input-subject">件名</label>
        <input type="text" id="input-subject" placeholder="例：Webサイト制作御請求">
      </div>
    </div>

    <div class="form-row">
      <div style="flex: 2;">
        <label for="input-item-name">品名 / 案件名</label>
        <input type="text" id="input-item-name" placeholder="例：システム開発案件 コーディング費">
      </div>
      <div>
        <label for="input-item-price">単価 (税抜・円)</label>
        <input type="number" id="input-item-price" placeholder="300000">
      </div>
    </div>

    <div class="form-row">
      <div>
        <label>インボイス制度（消費税10%内訳）</label>
        <div class="toggle-container">
          <button type="button" id="btn-invoice-on" class="btn-toggle active">対応する</button>
          <button type="button" id="btn-invoice-off" class="btn-toggle">非対応</button>
        </div>
      </div>
      <div>
        <label>源泉徴収税の自動差引（10.21%）</label>
        <div class="toggle-container">
          <button type="button" id="btn-gensen-on" class="btn-toggle">引く</button>
          <button type="button" id="btn-gensen-off" class="btn-toggle active">引かない</button>
        </div>
      </div>
    </div>

    <div class="panel-title" style="margin-top: 25px;">👤 あなたの情報（LocalStorageに自動記憶されます）</div>
    <div class="form-row">
      <div>
        <label for="save-my-name">屋号 / 氏名</label>
        <input type="text" id="save-my-name" placeholder="ココアアプリ開発工房">
      </div>
      <div>
        <label for="save-my-invoice-id">インボイス登録番号</label>
        <input type="text" id="save-my-invoice-id" placeholder="T1234567890123">
      </div>
    </div>

    <div class="form-group" style="margin-bottom: 15px;">
      <label for="save-my-address">住所・連絡先</label>
      <textarea id="save-my-address" rows="2" placeholder="〒000-0000..."></textarea>
    </div>

    <div class="form-group" style="margin-bottom: 15px;">
      <label for="save-my-bank">お振込先口座情報 (マナー100点用項目)</label>
      <textarea id="save-my-bank" rows="2" placeholder="〇〇銀行..."></textarea>
    </div>

    <div class="form-group">
      <label for="input-notes">備考欄</label>
      <textarea id="input-notes" rows="2" placeholder="※振込手数料は貴社にてご負担願います。"></textarea>
    </div>

    <div class="btn-container">
      <button class="btn btn-clear" id="clear-storage-btn">記憶クリア</button>
      <button class="btn btn-x" id="copy-x-btn">進捗をXで報告 📋</button>
      <button class="btn btn-pdf" id="pdf-output-btn">✨ 1タップでPDF出力</button>
    </div>
  </div>

  <!-- Xリンク設置エリア -->
  <div style="text-align: center; margin-top: 20px;">
    <a href="https://x.com/cocoa_next7" target="_blank" class="x-follow-badge">
      🐦 開発者ココアのX（旧Twitter）をフォローする ➔
    </a>
  </div>

  <div class="disclaimer">
    <strong>【免責事項・ご利用上の注意】</strong><br>
    本ツールはブラウザのLocalStorage機能を使用し、ユーザーの端末内のみに情報を保存します。サーバーにデータが送信されることはありません。本ツールで生成された書類の正確性や、これに起因するトラブル・不利益について、開発者は一切の責任を負いません。実際の取引にあたっては、インボイス制度等の要件を満たしているか、ご自身の責任で十分にご確認の上ご利用ください。
  </div>

</div>
    // 💡 ✨ 1タップでPDF出力ボタンが押された瞬間にだけ走る、超軽量印刷画面生成エンジン
    if (pdfOutputBtn) {
      pdfOutputBtn.addEventListener("click", () => {
        // 現在の最新入力値を取得
        const docType = docTypeInput ? (docTypeInput.value || '請求書') : '請求書';
        const docId = docIdInput ? (docIdInput.value || '---') : '---';
        const client = clientInput ? (clientInput.value || '株式会社〇〇 御中') : '株式会社〇〇 御中';
        const subject = subjectInput ? (subjectInput.value || '〇〇に関する御請求') : '〇〇に関する御請求';
        const itemName = itemNameInput ? (itemNameInput.value || '（未入力の品名）') : '（未入力の品名）';
        const itemPrice = itemPriceInput ? (parseFloat(itemPriceInput.value) || 0) : 0;

        const myName = myNameInput ? (myNameInput.value || '（あなたの屋号・氏名）') : '（あなたの屋号・氏名）';
        const myInvoiceId = myInvoiceIdInput ? (myInvoiceIdInput.value || '未登録') : '未登録';
        const myAddress = myAddressInput ? (myAddressInput.value || '（あなたの住所・連絡先）') : '（あなたの住所・連絡先）';
        const myBank = myBankInput ? (myBankInput.value || '（振込先口座情報）') : '（振込先口座情報）';
        const notes = notesInput ? (notesInput.value || '') : '';

        // 各種金額・税金の計算
        let subtotal = itemPrice;
        let tax = isInvoiceMode ? Math.floor(subtotal * 0.10) : 0;
        let gensen = isGensenMode ? Math.floor(subtotal * 0.1021) : 0;
        let grandTotal = subtotal + tax - gensen;

        // 日付フォーマット変換
        const formatDate = (dateStr) => {
          if(!dateStr) return '---';
          const d = new Date(dateStr);
          return `${d.getFullYear()}年${String(d.getMonth()+1).padStart(2,'0')}月${String(d.getDate()).padStart(2,'0')}日`;
        };

        // 💡 既存の古い印刷用隠しエリアがあれば事前に完全削除（多重生成バグ防止）
        const oldWrapper = document.getElementById('runtime-invoice-wrapper');
        if (oldWrapper) oldWrapper.remove();

        // 💡 画面には一切表示させず、ブラウザの印刷エンジン（PDF保存）にだけ認識させる「隠しA4エリア」を動的生成
        const wrapper = document.createElement('div');
        wrapper.id = 'runtime-invoice-wrapper';
        wrapper.className = 'invoice-preview-wrapper';
        // 画面上（ブラウザ上）では絶対に非表示にするスタイルを設定
        wrapper.style.display = 'none';

        // 印刷（PDF出力）するときだけ、CSSのメディアクエリで強制表示させるためのスタイルタグを動的挿入
        const styleTag = document.createElement('style');
        styleTag.innerHTML = `
          @media print {
            #runtime-invoice-wrapper { display: flex !important; background: none !important; padding: 0 !important; margin: 0 !important; }
            .control-panel, h1, .subtitle, .disclaimer, .no-print, .x-follow-badge { display: none !important; }
            .invoice-page { width: 100% !important; height: auto !important; box-shadow: none !important; padding: 0 !important; margin: 0 !important; }
          }
        `;
        wrapper.appendChild(styleTag);

        // マナー100点満点のA4用紙構造を裏側で一瞬で組み立て
        wrapper.innerHTML += `
          <div class="invoice-page" id="invoice">
            <div class="invoice-title">${docType.split('').join(' ')}</div>
            <div class="invoice-header">
              <div class="client-side">
                <div class="client-name">${client}</div>
                <div style="margin-top: 15px;">件名：${subject}</div>
              </div>
              <div class="provider-side">
                <div style="margin-bottom: 10px;">
                  <div>日付：${formatDate(issueDateInput.value)}</div>
                  <div>番号：${docId}</div>
                </div>
                <div class="provider-name">${myName}</div>
                <div style="white-space: pre-wrap; font-size: 12px; color: #333;">${myAddress}</div>
                <div style="font-size: 11px; margin-top: 5px;">${isInvoiceMode ? '登録番号: ' + myInvoiceId : ''}</div>
              </div>
            </div>

            <div class="total-block">
              <span>ご${docType}金額：</span>
              <span>￥${grandTotal.toLocaleString()}- (${isInvoiceMode ? '税込' : '非課税'})</span>
            </div>

            <table class="item-table">
              <thead>
                <tr>
                  <th style="width: 55%;">品名 / 項目</th>
                  <th style="width: 15%;">数量</th>
                  <th style="width: 30%;" class="text-right">金額(税込)</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>${itemName}</td>
                  <td class="text-center">1</td>
                  <td class="text-right">￥${subtotal.toLocaleString()}</td>
                </tr>
                <tr>
                  <td colspan="2" class="text-right" style="font-size: 12px; color: #555;">小計 (税抜)</td>
                  <td class="text-right">￥${subtotal.toLocaleString()}</td>
                </tr>
                ${isInvoiceMode ? `
                <tr>
                  <td colspan="2" class="text-right" style="font-size: 12px; color: #555;">消費税額 (10%)</td>
                  <td class="text-right">￥${tax.toLocaleString()}</td>
                </tr>` : ''}
                ${isGensenMode ? `
                <tr>
                  <td colspan="2" class="text-right" style="font-size: 12px; color: #d32f2f;">源泉徴収税額 (10.21%)</td>
                  <td class="text-right" style="color: #d32f2f;">-￥${gensen.toLocaleString()}</td>
                </tr>` : ''}
              </tbody>
            </table>

            <div class="invoice-footer-details">
              <div class="bottom-box">
                <div class="bottom-box-title">🏦 お振込み先</div>
                <p style="white-space: pre-wrap;">${myBank}</p>
              </div>
              <div class="bottom-box">
                <div class="bottom-box-title">📝 備考 / お支払期限</div>
                <div><strong>期限:</strong> ${formatDate(dueDateInput.value)}</div>
                <p style="margin-top: 8px; white-space: pre-wrap;">${notes}</p>
              </div>
            </div>
          </div>
        `;

        // 組み立てた隠しデータをbodyの末尾に一瞬だけ配置
        document.body.appendChild(wrapper);

        // 💡 画面上のプレビューではなく、この動的組み立てエリアだけを対象に、安全に印刷ダイアログ（PDF保存）を即座に起動
        window.print();
      });
    }

    // 記憶クリア処理
    if (clearStorageBtn) {
      clearStorageBtn.addEventListener("click", () => {
        if(confirm('記憶しているあなたの情報や口座情報を完全に削除しますか？')) {
          localStorage.clear();
          if (myNameInput) myNameInput.value = '';
          if (myInvoiceIdInput) myInvoiceIdInput.value = '';
          if (myAddressInput) myAddressInput.value = '';
          if (myBankInput) myBankInput.value = '';
          isInvoiceMode = true; isGensenMode = false;
          if (btnInvoiceOn) btnInvoiceOn.classList.add("active");
          if (btnInvoiceOff) btnInvoiceOff.classList.remove("active");
          if (btnGensenOn) btnGensenOn.classList.remove("active");
          if (btnGensenOff) btnGensenOff.classList.add("active");
          updateDataOnly();
        }
      });
    }

    // 最速コピー処理
    if (copyXBtn) {
      copyXBtn.addEventListener("click", () => {
        if (!shareText) return;
        navigator.clipboard.writeText(shareText).then(() => {
          copyXBtn.textContent = "進捗コピー完了！Xへ移動します...💨";
          copyXBtn.style.backgroundColor = "#2ed573";
          setTimeout(() => {
            copyXBtn.textContent = "進捗をXで報告 📋";
            copyXBtn.style.backgroundColor = "#1da1f2";
          }, 1500);
        });
      });
    }

    // 初回起動時のデータ・シェアテキスト初期化（※window.printは絶対に走りません）
    updateDataOnly();
  });
</script>
</body>
</html>
