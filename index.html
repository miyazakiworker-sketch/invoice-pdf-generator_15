<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>見積書・請求書ジェネレーター｜COCOA TOOLS v2.0</title>

<meta name="description"
content="見積書・請求書をブラウザだけで簡単作成。印刷・PDF保存・LocalStorage対応。">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0d0f12;
color:#e2e8f0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
padding:18px;
display:flex;
justify-content:center;
}

.container{
width:100%;
max-width:480px;
background:#1a1f26;
border:1px solid #2d3748;
border-radius:20px;
padding:24px 18px;
box-shadow:0 10px 35px rgba(0,0,0,.45);
}

.logo{
font-size:3rem;
text-align:center;
margin-bottom:10px;
}

h1{
text-align:center;
font-size:1.7rem;
color:#fff;
margin-bottom:8px;
}

.bio{
text-align:center;
color:#94a3b8;
font-size:.9rem;
margin-bottom:25px;
line-height:1.6;
}

.section-title{
margin:28px 0 14px;
padding-bottom:8px;
border-bottom:2px solid #2d3748;
font-size:1.15rem;
font-weight:bold;
}

.card{
background:#111827;
border:1px solid #2d3748;
border-radius:14px;
padding:16px;
margin-bottom:18px;
}

label{
display:block;
font-size:.82rem;
margin-bottom:6px;
color:#cbd5e0;
}

input,
textarea,
select{

width:100%;
background:#0d1117;
color:#fff;
border:1px solid #374151;
border-radius:10px;
padding:12px;
margin-bottom:14px;
font-size:.92rem;

}

textarea{

resize:vertical;

}

.row{

display:flex;
gap:10px;

}

.row .col{

flex:1;

}

.button{

width:100%;
background:#a3e635;
color:#111827;
border:none;
border-radius:12px;
padding:14px;
font-size:1rem;
font-weight:bold;
cursor:pointer;
margin-top:12px;
transition:.2s;

}

.button:hover{

background:#b8f24b;

}

.sub-button{

width:100%;
background:#374151;
color:#fff;
border:none;
border-radius:12px;
padding:13px;
margin-top:10px;
cursor:pointer;

}

.toggle{

display:flex;
gap:10px;

}

.toggle button{

flex:1;
padding:12px;
border:none;
border-radius:10px;
background:#374151;
color:#fff;
cursor:pointer;

}

.toggle button.active{

background:#2563eb;

}

.info{

background:#111827;
border:1px solid #2d3748;
border-radius:12px;
padding:15px;
font-size:.82rem;
line-height:1.7;
color:#94a3b8;
margin-top:20px;

}

footer{

margin-top:30px;
padding-top:20px;
border-top:1px solid #2d3748;
text-align:center;

}

footer a{

color:#60a5fa;
text-decoration:none;

}

</style>

</head>

<body>

<div class="container">

<div class="logo">
📄
</div>

<h1>
見積書・請求書ジェネレーター
</h1>

<p class="bio">

入力するだけで<br>
見積書・請求書を一瞬作成。

</p>

<h2 class="section-title">
📝 基本情報
</h2>

<div class="card">

<label>
書類種類
</label>

<select id="docType">

<option>見積書</option>
<option>請求書</option>

</select>

<label>
発行日
</label>

<input
type="date"
id="issueDate">

<label>
宛名
</label>

<input
type="text"
id="client"
placeholder="株式会社○○ 御中">

<label>
件名
</label>

<input
type="text"
id="subject"
placeholder="工事代金">

</div><h2 class="section-title">
👤 あなたの情報
</h2>

<div class="card">

<label>
屋号・会社名
</label>

<input
type="text"
id="myName"
placeholder="COCOA TOOLS">

<label>
担当者名
</label>

<input
type="text"
id="myPerson"
placeholder="ココア">

<label>
住所
</label>

<textarea
id="myAddress"
rows="3"
placeholder="〒000-0000&#10;東京都○○区○○1-2-3">
</textarea>

<label>
電話番号
</label>

<input
type="text"
id="myPhone"
placeholder="090-1234-5678">

<label>
メールアドレス
</label>

<input
type="email"
id="myMail"
placeholder="sample@example.com">

<label>
インボイス登録番号
</label>

<input
type="text"
id="invoiceId"
placeholder="T1234567890123">

<label>
振込先
</label>

<textarea
id="bank"
rows="3"
placeholder="○○銀行 ○○支店&#10;普通 1234567&#10;ココア">
</textarea>

</div>

<h2 class="section-title">
📦 明細
</h2>

<div class="card">

<label>
品名
</label>

<input
type="text"
id="itemName"
placeholder="ホームページ制作">

<div class="row">

<div class="col">

<label>
数量
</label>

<input
type="number"
id="qty"
value="1">

</div>

<div class="col">

<label>
単価
</label>

<input
type="number"
id="price"
placeholder="100000">

</div>

</div>

<div class="row">

<div class="col">

<label>
消費税
</label>

<select id="tax">

<option value="10">
10％
</option>

<option value="8">
8％
</option>

<option value="0">
なし
</option>

</select>

</div>

<div class="col">

<label>
源泉徴収
</label>

<div class="toggle">

<button
id="gensenOff"
class="active"
type="button">
OFF
</button>

<button
id="gensenOn"
type="button">
ON
</button>

</div>

</div>

</div>

<div style="margin-top:14px;">

<label>
インボイス制度
</label>

<div class="toggle">

<button
id="invoiceOn"
class="active"
type="button">
対応
</button>

<button
id="invoiceOff"
type="button">
非対応
</button>

</div>

</div>

</div><h2 class="section-title">
💰 計算結果
</h2>

<div class="card">

<div class="row">

<div class="col">

<label>小計</label>

<input
type="text"
id="subtotal"
readonly>

</div>

<div class="col">

<label>消費税</label>

<input
type="text"
id="taxPrice"
readonly>

</div>

</div>

<label>
源泉徴収
</label>

<input
type="text"
id="gensenPrice"
readonly>

<label>
合計金額（税込）
</label>

<input
type="text"
id="grandTotal"
readonly
style="
font-size:1.3rem;
font-weight:bold;
color:#a3e635;
">

</div>

<h2 class="section-title">
⚡ 操作
</h2>

<div class="card">

<button
class="button"
id="calcBtn">

🧮 合計を計算

</button>

<button
class="button"
id="pdfBtn">

📄 PDF保存

</button>

<button
class="sub-button"
id="copyBtn">

📋 内容コピー

</button>

<button
class="sub-button"
id="lineBtn">

💬 LINE共有

</button>

<button
class="sub-button"
id="xBtn">

🐦 Xへ投稿

</button>

<button
class="sub-button"
id="clearBtn">

🗑 入力をリセット

</button>

</div>

<div class="ad-box">

広告スペース

</div>

<div class="info">

<strong>免責事項</strong><br><br>

本ツールは簡易的な見積書・請求書作成ツールです。内容の正確性は保証しておりません。実際の請求・税務処理・インボイス制度については、必ず税理士・税務署・取引先の指示をご確認ください。

</div>

<footer>

<p>

開発：
<a
href="https://x.com/cocoa_next7"
target="_blank">

ココア (@cocoa_next7)

</a>

</p>

<p
style="
margin-top:10px;
color:#64748b;
font-size:.8rem;
">

© COCOA TOOLS v2.0

</p>

</footer>

</div>

<script>

const qty=document.getElementById("qty");
const price=document.getElementById("price");
const tax=document.getElementById("tax");

const subtotal=document.getElementById("subtotal");
const taxPrice=document.getElementById("taxPrice");
const gensenPrice=document.getElementById("gensenPrice");
const grandTotal=document.getElementById("grandTotal");

let gensen=false;

document.getElementById("gensenOn").onclick=()=>{

gensen=true;

document.getElementById("gensenOn").classList.add("active");
document.getElementById("gensenOff").classList.remove("active");

}

document.getElementById("gensenOff").onclick=()=>{

gensen=false;

document.getElementById("gensenOff").classList.add("active");
document.getElementById("gensenOn").classList.remove("active");

}

document.getElementById("calcBtn").onclick=()=>{

const q=Number(qty.value)||0;

const p=Number(price.value)||0;

const sub=q*p;

const taxValue=Math.floor(sub*(Number(tax.value)/100));

const gen=gensen?Math.floor(sub*0.1021):0;

const total=sub+taxValue-gen;

subtotal.value="¥"+sub.toLocaleString();

taxPrice.value="¥"+taxValue.toLocaleString();

gensenPrice.value="¥"+gen.toLocaleString();

grandTotal.value="¥"+total.toLocaleString();

};
// ===== LocalStorage =====

const saveIds=[
"docType",
"issueDate",
"client",
"subject",
"myName",
"myPerson",
"myAddress",
"myPhone",
"myMail",
"invoiceId",
"bank",
"itemName",
"qty",
"price",
"tax"
];

saveIds.forEach(id=>{

const el=document.getElementById(id);

if(!el)return;

const data=localStorage.getItem(id);

if(data!==null){

el.value=data;

}

el.addEventListener("input",()=>{

localStorage.setItem(id,el.value);

});

});

// ===== PDF保存 =====

document.getElementById("pdfBtn").onclick=()=>{

window.print();

};

// ===== コピー =====

document.getElementById("copyBtn").onclick=()=>{

const text=

`【${document.getElementById("docType").value}】

宛名：${document.getElementById("client").value}

件名：${document.getElementById("subject").value}

品名：${document.getElementById("itemName").value}

合計：${grandTotal.value}

発行者：${document.getElementById("myName").value}`;

navigator.clipboard.writeText(text);

alert("コピーしました");

};

// ===== LINE =====

document.getElementById("lineBtn").onclick=()=>{

const text=encodeURIComponent(

`${document.getElementById("docType").value}

${document.getElementById("subject").value}

${grandTotal.value}`

);

window.open(

"https://social-plugins.line.me/lineit/share?text="+text,

"_blank"

);

};

// ===== X =====

document.getElementById("xBtn").onclick=()=>{

const text=encodeURIComponent(

`${document.getElementById("docType").value}を作成しました📄

${grandTotal.value}

#COCOATOOLS`

);

window.open(

"https://twitter.com/intent/tweet?text="+text,

"_blank"

);

};

// ===== リセット =====

document.getElementById("clearBtn").onclick=()=>{

if(!confirm("入力内容を削除しますか？")){

return;

}

saveIds.forEach(id=>{

localStorage.removeItem(id);

const el=document.getElementById(id);

if(el){

el.value="";

}

});

subtotal.value="";

taxPrice.value="";

gensenPrice.value="";

grandTotal.value="";

};

// 初回計算

document.getElementById("calcBtn").click();

</script>

</body>
</html>
